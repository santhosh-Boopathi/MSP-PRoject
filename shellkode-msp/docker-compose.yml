version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: shellkode_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: shellkode_msp

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shellkode_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/shellkode_msp
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FRESHDESK_DOMAIN: ${FRESHDESK_DOMAIN}
      FRESHDESK_API_KEY: ${FRESHDESK_API_KEY}
      ALLOWED_EMAIL_DOMAIN: shellkode.com
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shellkode_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
